services:
  postgres:
    image: postgres:16
    container_name: mediconnect-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mediconnect-network

  backend:
    build:
      context: ./backend
    container_name: mediconnect-backend
    restart: always
    depends_on:
      - postgres
    environment:
      PORT: ${BACKEND_PORT}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - mediconnect-network

  frontend:
    build:
      context: ./frontend
    container_name: mediconnect-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    networks:
      - mediconnect-network

  nginx:
    image: nginx:latest
    container_name: mediconnect-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - mediconnect-network

volumes:
  postgres_data:
  uploads_data:

networks:
  mediconnect-network:
    driver: bridge