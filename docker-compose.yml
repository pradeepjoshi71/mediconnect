services:
  postgres:
    image: postgres:16
    container_name: mediconnect-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mediconnect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: mediconnect-backend
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      DB_POOL_MAX: ${DB_POOL_MAX}
      API_RATE_LIMIT: ${API_RATE_LIMIT}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES}
      UPLOADS_DIR: ${UPLOADS_DIR}
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:${UPLOADS_DIR}
    networks:
      - mediconnect-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    container_name: mediconnect-frontend
    restart: always
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4173:4173"
    networks:
      - mediconnect-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:latest
    container_name: mediconnect-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - mediconnect-network

volumes:
  postgres_data:
  uploads_data:

networks:
  mediconnect-network:
    driver: bridge
