events {
  worker_connections 1024;
}

http {
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss;

  upstream mediconnect_frontend {
    server frontend:4173;
  }

  upstream mediconnect_backend {
    server backend:5000;
  }

  client_max_body_size 15m;
  server_tokens off;

  server {
    listen 80;

    location = /nginx-health {
      return 200 "ok";
    }

    location /socket.io/ {
      proxy_pass http://mediconnect_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 300s;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://mediconnect_frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://mediconnect_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
